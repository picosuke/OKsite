<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Proxy Viewer</title>
  <!-- Tailwind CSSをCDNから直接読み込みます -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 flex flex-col font-sans">
  <header class="bg-white border-b border-slate-200 px-6 mx-auto w-full py-4 shadow-sm z-10 flex flex-col md:flex-row items-center justify-between gap-4">
    <h1 class="text-xl font-bold tracking-tight text-slate-800 flex items-center gap-2">
      <!-- 地球のアイコン -->
      <svg class="w-6 h-6 text-indigo-600" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      Web Proxy Viewer
    </h1>
    <form id="proxy-form" class="w-full md:max-w-2xl flex gap-2">
      <div class="relative flex-1">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <!-- リンクアイコン -->
          <svg class="h-5 w-5 text-slate-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        </div>
        <input
          type="text"
          id="url-input"
          class="block w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg leading-5 bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-all"
          placeholder="Enter a website URL (e.g., example.com)"
          required
        />
      </div>
      <button
        type="submit"
        id="submit-btn"
        class="flex items-center justify-center bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-medium transition-colors disabled:opacity-70 min-w-[100px]"
      >
        <span id="btn-text">Fetch code</span>
        <!-- ローディングアイコン (初期は非表示) -->
        <svg id="loader-icon" class="w-5 h-5 animate-spin hidden" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
      </button>
    </form>
  </header>

  <main class="flex-1 flex flex-col container mx-auto p-4 md:p-6 h-[calc(100vh-80px)]">
    
    <!-- エラー画面 -->
    <div id="error-state" class="bg-red-50 border border-red-200 text-red-900 px-6 py-12 rounded-2xl w-full max-w-2xl mx-auto mt-12 flex flex-col items-center justify-center text-center shadow-sm hidden">
      <svg class="w-12 h-12 text-red-500 mb-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
      <h2 class="text-lg font-bold mb-2">Target Unavailable</h2>
      <p id="error-message" class="text-red-700 leading-relaxed font-medium"></p>
    </div>

    <!-- Iframe表示画面 -->
    <div id="iframe-state" class="flex-1 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden relative flex flex-col h-full w-full hidden">
      <iframe
        id="proxy-frame"
        class="w-full h-full border-none flex-1 bg-white"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
      ></iframe>
    </div>

    <!-- 初期画面 -->
    <div id="initial-state" class="flex-1 flex flex-col items-center justify-center text-slate-500 p-8 text-center max-w-lg mx-auto">
      <div class="bg-slate-100 p-4 rounded-full mb-6 relative">
        <svg class="w-8 h-8 text-slate-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </div>
      <h2 class="text-2xl font-bold text-slate-800 mb-3 tracking-tight">Access Content Safely</h2>
      <p class="text-slate-600 mb-8 leading-relaxed">
        このツールはプロキシサーバー経由で外部サイトのHTMLを取得し、安全なiframeコンテナ内に表示します。
      </p>
      <div class="text-xs bg-amber-50 text-amber-800 border-l-4 border-amber-500 p-4 rounded text-left shadow-sm">
        <strong class="block mb-1 text-sm">※注意事項</strong>
        一部の複雑なウェブサイト（CORS制限が厳しいサイト等）では、レイアウトが崩れたりアクセスできない場合があります。
      </div>
    </div>
  </main>

  <script>
    const form = document.getElementById('proxy-form');
    const urlInput = document.getElementById('url-input');
    const submitBtn = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    const loaderIcon = document.getElementById('loader-icon');
    
    const errorState = document.getElementById('error-state');
    const errorMessage = document.getElementById('error-message');
    const iframeState = document.getElementById('iframe-state');
    const proxyFrame = document.getElementById('proxy-frame');
    const initialState = document.getElementById('initial-state');

    // ローディング状態の切り替え
    function setLoading(isLoading) {
      if (isLoading) {
        submitBtn.disabled = true;
        btnText.classList.add('hidden');
        loaderIcon.classList.remove('hidden');
      } else {
        submitBtn.disabled = false;
        btnText.classList.remove('hidden');
        loaderIcon.classList.add('hidden');
      }
    }

    // 表示エリアの切り替え
    function showState(state) {
      errorState.classList.add('hidden');
      iframeState.classList.add('hidden');
      initialState.classList.add('hidden');

      if (state === 'error') errorState.classList.remove('hidden');
      else if (state === 'iframe') iframeState.classList.remove('hidden');
      else initialState.classList.remove('hidden');
    }

    // 送信時の処理 (プロキシを経由してHTMLを取得)
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      let url = urlInput.value.trim();
      if (!url) return;

      if (!/^https?:\/\//i.test(url)) {
        url = 'https://' + url;
        urlInput.value = url;
      }

      setLoading(true);
      showState('initial');

      try {
        // 第一候補のプロキシ
        let proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
        let response = await fetch(proxyUrl);
        
        if (!response.ok) {
          // 失敗した場合は第二候補を利用
          proxyUrl = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`;
          response = await fetch(proxyUrl);
          
          if (!response.ok) {
             throw new Error('Failed to proxy the URL');
          }
        }

        let html = await response.text();
        
        if (!html) {
          throw new Error('No content returned');
        }
        
        // CSSや画像を正しく読み込ませるためのベースURLを注入
        const baseTag = `<base href="${url}">`;
        if (html.toLowerCase().includes('<head>')) {
          html = html.replace(/<head>/i, `<head>\n    ${baseTag}`);
        } else {
          html = `${baseTag}\n${html}`;
        }
        
        // Iframeに直接HTMLを流し込む
        proxyFrame.srcdoc = html;
        showState('iframe');

      } catch (err) {
        errorMessage.textContent = err.message || 'Failed to connect to the target website';
        showState('error');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
